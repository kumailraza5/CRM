services:
  - type: web
    name: lead-manager-pro
    runtime: node
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm --filter @workspace/api-server start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: API_PORT
        value: "10000"
      - key: BASE_PATH
        value: "/"
