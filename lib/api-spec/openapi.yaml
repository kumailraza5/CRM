openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ClientHunter CRM API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Lead management
  - name: notes
    description: Lead notes and timeline
  - name: templates
    description: Outreach templates
  - name: deals
    description: Revenue / deals
  - name: activities
    description: Activity log
  - name: dashboard
    description: Dashboard summaries
  - name: reports
    description: Analytics and reports
  - name: auth
    description: Authentication operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # --- LEADS ---
  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List all leads with optional filters
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
        - name: industry
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: minBudget
          in: query
          schema:
            type: number
        - name: maxBudget
          in: query
          schema:
            type: number
        - name: noWebsite
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a new lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadRequest"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get a single lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    put:
      operationId: updateLead
      tags: [leads]
      summary: Update a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadRequest"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /leads/{id}/score:
    get:
      operationId: getLeadScore
      tags: [leads]
      summary: Get AI lead score suggestion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead score and tips
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadScore"

  # --- FOLLOW-UPS ---
  /followups/today:
    get:
      operationId: getFollowupsToday
      tags: [leads]
      summary: Get leads with follow-ups due today
      responses:
        "200":
          description: Follow-ups due today
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"

  /followups/overdue:
    get:
      operationId: getFollowupsOverdue
      tags: [leads]
      summary: Get overdue follow-ups
      responses:
        "200":
          description: Overdue follow-ups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"

  /followups/upcoming:
    get:
      operationId: getFollowupsUpcoming
      tags: [leads]
      summary: Get upcoming follow-ups (next 7 days)
      responses:
        "200":
          description: Upcoming follow-ups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"

  /leads/{id}/followup/complete:
    post:
      operationId: completeFollowup
      tags: [leads]
      summary: Mark a follow-up as completed and optionally reschedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteFollowupRequest"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  # --- NOTES ---
  /leads/{leadId}/notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List notes for a lead
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Add a note to a lead
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteRequest"
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /notes/{id}:
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- TEMPLATES ---
  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List all outreach templates
      responses:
        "200":
          description: Templates list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"
    post:
      operationId: createTemplate
      tags: [templates]
      summary: Create a new template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateRequest"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"

  /templates/{id}:
    put:
      operationId: updateTemplate
      tags: [templates]
      summary: Update a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTemplateRequest"
      responses:
        "200":
          description: Updated template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- DEALS ---
  /deals:
    get:
      operationId: listDeals
      tags: [deals]
      summary: List all won deals
      responses:
        "200":
          description: Deals list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deal"
    post:
      operationId: createDeal
      tags: [deals]
      summary: Create a new deal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDealRequest"
      responses:
        "201":
          description: Deal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"

  /deals/{id}:
    put:
      operationId: updateDeal
      tags: [deals]
      summary: Update a deal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDealRequest"
      responses:
        "200":
          description: Updated deal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"
    delete:
      operationId: deleteDeal
      tags: [deals]
      summary: Delete a deal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- DASHBOARD ---
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard KPI summary
      responses:
        "200":
          description: Dashboard summary metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/pipeline:
    get:
      operationId: getDashboardPipeline
      tags: [dashboard]
      summary: Get pipeline stage counts
      responses:
        "200":
          description: Pipeline breakdown by status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PipelineStage"

  /dashboard/monthly:
    get:
      operationId: getDashboardMonthly
      tags: [dashboard]
      summary: Get monthly leads added over the past 6 months
      responses:
        "200":
          description: Monthly chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyData"

  # --- REPORTS ---
  /reports/conversion:
    get:
      operationId: getConversionReport
      tags: [reports]
      summary: Get won vs lost conversion stats
      responses:
        "200":
          description: Conversion report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversionReport"

  /reports/by-country:
    get:
      operationId: getReportByCountry
      tags: [reports]
      summary: Get lead counts grouped by country
      responses:
        "200":
          description: Leads by country
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupedCount"

  /reports/by-industry:
    get:
      operationId: getReportByIndustry
      tags: [reports]
      summary: Get lead counts grouped by industry
      responses:
        "200":
          description: Leads by industry
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupedCount"

  /reports/weekly:
    get:
      operationId: getWeeklyLeadsReport
      tags: [reports]
      summary: Get weekly leads added for the past 8 weeks
      responses:
        "200":
          description: Weekly leads chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyData"

  # --- ACTIVITIES ---
  /activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List recent activities (last 20)
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"

  # --- AUTH ---
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Invalid input or user already exists

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/user:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current logged in user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not logged in

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Lead:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        companyName:
          type: string
        linkedinUrl:
          type: string
          nullable: true
        websiteUrl:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        industry:
          type: string
          nullable: true
        companySize:
          type: string
          nullable: true
        leadSource:
          type: string
          nullable: true
        status:
          type: string
        priority:
          type: string
        estimatedBudget:
          type: number
          nullable: true
        notes:
          type: string
          nullable: true
        lastContactDate:
          type: string
          nullable: true
        nextFollowupDate:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - fullName
        - companyName
        - status
        - priority
        - createdAt
        - updatedAt

    CreateLeadRequest:
      type: object
      properties:
        fullName:
          type: string
        companyName:
          type: string
        linkedinUrl:
          type: string
          nullable: true
        websiteUrl:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        industry:
          type: string
          nullable: true
        companySize:
          type: string
          nullable: true
        leadSource:
          type: string
          nullable: true
        status:
          type: string
        priority:
          type: string
        estimatedBudget:
          type: number
          nullable: true
        notes:
          type: string
          nullable: true
        lastContactDate:
          type: string
          nullable: true
        nextFollowupDate:
          type: string
          nullable: true
      required:
        - fullName
        - companyName
        - status
        - priority

    UpdateLeadRequest:
      type: object
      properties:
        fullName:
          type: string
        companyName:
          type: string
        linkedinUrl:
          type: string
          nullable: true
        websiteUrl:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        industry:
          type: string
          nullable: true
        companySize:
          type: string
          nullable: true
        leadSource:
          type: string
          nullable: true
        status:
          type: string
        priority:
          type: string
        estimatedBudget:
          type: number
          nullable: true
        notes:
          type: string
          nullable: true
        lastContactDate:
          type: string
          nullable: true
        nextFollowupDate:
          type: string
          nullable: true

    LeadScore:
      type: object
      properties:
        score:
          type: integer
        label:
          type: string
        tips:
          type: array
          items:
            type: string
        bestFollowupTime:
          type: string
      required: [score, label, tips, bestFollowupTime]

    CompleteFollowupRequest:
      type: object
      properties:
        rescheduleInDays:
          type: integer
          nullable: true
      required: []

    Note:
      type: object
      properties:
        id:
          type: integer
        leadId:
          type: integer
        type:
          type: string
        content:
          type: string
        createdAt:
          type: string
      required: [id, leadId, type, content, createdAt]

    CreateNoteRequest:
      type: object
      properties:
        type:
          type: string
        content:
          type: string
      required: [type, content]

    Template:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        subject:
          type: string
          nullable: true
        content:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, title, category, content, createdAt, updatedAt]

    CreateTemplateRequest:
      type: object
      properties:
        title:
          type: string
        category:
          type: string
        subject:
          type: string
          nullable: true
        content:
          type: string
      required: [title, category, content]

    UpdateTemplateRequest:
      type: object
      properties:
        title:
          type: string
        category:
          type: string
        subject:
          type: string
          nullable: true
        content:
          type: string

    Deal:
      type: object
      properties:
        id:
          type: integer
        leadId:
          type: integer
          nullable: true
        clientName:
          type: string
        serviceSold:
          type: string
        amount:
          type: number
        currency:
          type: string
        dealDate:
          type: string
        paymentStatus:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, clientName, serviceSold, amount, currency, dealDate, paymentStatus, createdAt, updatedAt]

    CreateDealRequest:
      type: object
      properties:
        leadId:
          type: integer
          nullable: true
        clientName:
          type: string
        serviceSold:
          type: string
        amount:
          type: number
        currency:
          type: string
        dealDate:
          type: string
        paymentStatus:
          type: string
        notes:
          type: string
          nullable: true
      required: [clientName, serviceSold, amount, currency, dealDate, paymentStatus]

    UpdateDealRequest:
      type: object
      properties:
        leadId:
          type: integer
          nullable: true
        clientName:
          type: string
        serviceSold:
          type: string
        amount:
          type: number
        currency:
          type: string
        dealDate:
          type: string
        paymentStatus:
          type: string
        notes:
          type: string
          nullable: true

    DashboardSummary:
      type: object
      properties:
        totalLeads:
          type: integer
        newLeads:
          type: integer
        followupsDueToday:
          type: integer
        repliesReceived:
          type: integer
        dealsWon:
          type: integer
        revenueClosed:
          type: number
        overdueFollowups:
          type: integer
      required:
        - totalLeads
        - newLeads
        - followupsDueToday
        - repliesReceived
        - dealsWon
        - revenueClosed
        - overdueFollowups

    PipelineStage:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
      required: [status, count]

    MonthlyData:
      type: object
      properties:
        month:
          type: string
        count:
          type: integer
        revenue:
          type: number
      required: [month, count, revenue]

    ConversionReport:
      type: object
      properties:
        won:
          type: integer
        lost:
          type: integer
        inProgress:
          type: integer
        conversionRate:
          type: number
        totalRevenue:
          type: number
      required: [won, lost, inProgress, conversionRate, totalRevenue]

    GroupedCount:
      type: object
      properties:
        name:
          type: string
        count:
          type: integer
        revenue:
          type: number
      required: [name, count, revenue]

    WeeklyData:
      type: object
      properties:
        week:
          type: string
        count:
          type: integer
      required: [week, count]

    Activity:
      type: object
      properties:
        id:
          type: integer
        leadId:
          type: integer
          nullable: true
        leadName:
          type: string
          nullable: true
        type:
          type: string
        description:
          type: string
        createdAt:
          type: string
      required: [id, type, description, createdAt]

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
      required: [id, name, email]

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        supabaseId:
          type: string
      required: [name, email, supabaseId]

